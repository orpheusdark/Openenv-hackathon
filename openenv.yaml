name: email-triage-response-openenv
version: 1.0.0
description: Production-grade email triage and response environment for RL benchmarking.
author: openenv_hackathon
entrypoint: server/app.py
framework: fastapi
language: python
python_version: "3.11"
server:
  host: 0.0.0.0
  port: 7860
  routes:
    - /reset
    - /step
    - /state
    - /tasks
    - /grader
    - /baseline
environment:
  class_name: EmailTriageEnv
  module: env
  methods:
    - reset
    - step
    - state
  pydantic_models:
    observation: Observation
    action: Action
    reward: Reward
tasks:
  - easy
  - medium
  - hard
validation:
  deterministic: true
  reward_range: unrestricted_dense
  grader_score_range:
    min: 0.0
    max: 1.0
